data:
  patch_dir: "data/patches"
  window_size: 7
  min_sequence_length: 8
  batch_size: 64
  num_workers: 8
model:
  encoder_checkpoint: "checkpoints/stage1_v24/checkpoint_latest.pth"
  predictor_checkpoint: "checkpoints/ablation_k_7/best_temporal.pt"
  embed_dim: 768
  in_chans: 1
  num_layers: 4
  num_heads: 8
  ffn_dim: 2048
  dropout: 0.1
  time_encoding_type: "sinusoidal"
training:
  encoder_lr: 1.0e-5
  predictor_lr: 1.0e-4
  weight_decay: 0.01
  epochs_phase_a: 30
  epochs_phase_b: 20
  loss_type: "smooth_l1"
  grad_clip: 1.0
output:
  checkpoint_dir: "checkpoints/stage3_v24"
  save_every: 10
